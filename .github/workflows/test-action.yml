name: KQL Guard — Lint & Upload SARIF

on:
  pull_request:
    branches: [main]

permissions:
  actions: read             # Required by upload-sarif to query workflow run metadata
  contents: read
  security-events: write    # Required for github/codeql-action/upload-sarif

jobs:
  kql-guard:
    name: Scan KQL detections
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run rule self-check
        run: ./test/run-tests.sh

      - name: Check KQL formatting
        run: dotnet bin/Debug/net8.0/kql-guard.dll fmt samples/cost --check

      - name: Build kql-guard (NativeAOT)
        run: dotnet publish -c Release -r linux-x64

      - name: Run KQL Guard
        uses: ./
        with:
          mode: prebuilt
          path: "."

      - name: Build demo SARIF (with schema, for inline alerts)
        if: always()
        run: bin/Release/net8.0/linux-x64/publish/kql-guard demo/detections --schema demo/schema.json --format sarif > demo-results.sarif || true

      - name: Upload demo SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        if: always()
        with:
          sarif_file: demo-results.sarif
          category: kql-guard-demo

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true   # Code scanning needs a public repo / GHAS
        if: always()
        with:
          sarif_file: kql-guard-results.sarif
          category: kql-guard

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kql-guard-results
          path: kql-guard-results.sarif

  # --- Exec demo: each feature is its own visible check, red where it should be ---
  demo-cost-gate:
    name: "Demo: FinOps cost gate (expect fail)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "8.0.x" }
      - name: Block over-budget query
        run: dotnet run -- demo/detections --max-cost 1

  demo-schema:
    name: "Demo: schema validation KQL101 (expect fail)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "8.0.x" }
      - name: Flag unknown column
        run: dotnet run -- demo/detections --schema demo/schema.json

  demo-formatter:
    name: "Demo: gofmt-for-KQL (expect fail)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "8.0.x" }
      - name: Enforce canonical style
        run: dotnet run -- fmt demo/detections --check
