name: KQL Guard — Lint & Upload SARIF

on:
  pull_request:
    branches: [main]

permissions:
  actions: read             # Required by upload-sarif to query workflow run metadata
  contents: read
  security-events: write    # Required for github/codeql-action/upload-sarif

jobs:
  kql-guard:
    name: Scan KQL detections
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run rule self-check
        run: ./test/run-tests.sh

      - name: Check KQL formatting
        run: dotnet bin/Debug/net8.0/kql-guard.dll fmt samples/cost --check

      - name: Build kql-guard (NativeAOT)
        run: dotnet publish -c Release -r linux-x64

      - name: Run KQL Guard
        uses: ./
        with:
          mode: prebuilt
          path: "."

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true   # Code scanning needs a public repo / GHAS
        if: always()
        with:
          sarif_file: kql-guard-results.sarif
          category: kql-guard

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: kql-guard-results
          path: kql-guard-results.sarif
