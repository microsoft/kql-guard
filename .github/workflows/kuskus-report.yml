name: Kuskus calibration report

# Runs on a self-hosted runner that has Kuskus (confidential ADX) access.
# Aperiodic: weekly cron + manual dispatch. Only aggregate numbers leave the
# runner; query text stays in the git-ignored scratch/.
#
# Deferred integrations (shipped as fail-closed stubs): the real QueryCompletion
# fetch (scripts/fetch-corpus.sh) and the provider-specific AI suggester. The
# calibration + weight-review path needs no AI; the pipeline runs end-to-end
# today against a supplied corpus_path via scripts/mock-suggester.py.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Open mechanical weight PRs (else dry-run)"
        type: boolean
        default: false
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  calibrate:
    runs-on: [self-hosted, kuskus]
    steps:
      - uses: actions/checkout@v4
      - name: Fetch corpus + cost manifest
        run: scripts/fetch-corpus.sh   # real fetch (deferred); fails closed until implemented
      - name: Run calibration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APPLY=""
          if [[ "${{ inputs.apply }}" == "true" ]]; then APPLY="--apply"; fi
          scripts/run-calibration.sh --corpus-path scratch --manifest manifest.json $APPLY
      - name: Publish report to job summary
        if: always()
        run: cat report.md >> "$GITHUB_STEP_SUMMARY" || true

  mine:
    runs-on: [self-hosted, kuskus]
    needs: calibrate
    steps:
      - uses: actions/checkout@v4
      - name: Fetch corpus + cost manifest
        run: scripts/fetch-corpus.sh   # real fetch (deferred); fails closed until implemented
      - name: Mine shapes + draft/validate/publish new-rule candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APPLY=""
          if [[ "${{ inputs.apply }}" == "true" ]]; then APPLY="--apply"; fi
          scripts/run-mining.sh --corpus-path scratch --manifest manifest.json $APPLY
