name: Kuskus calibration report

# Runs on the persistent self-hosted runner (see infra/, kuskus-runner-infra):
# a small always-on Azure VM with a managed identity that can reach the Kuskus
# ADX cluster. Aperiodic: weekly cron + manual dispatch. Only aggregate numbers
# leave the runner; query text stays in the git-ignored scratch/, which the
# final `if: always()` scrub step deletes so it never persists past a run (the
# VM's workspace is reused between runs, unlike the old ephemeral container).
#
# Deferred integration (shipped as a fail-closed stub): the provider-specific AI
# suggester. The calibration + weight-review path needs no AI; mining runs
# end-to-end via scripts/mock-suggester.py. The QueryCompletion fetch is live
# (scripts/fetch_corpus.py). calibrate + mine share ONE job so the corpus is
# fetched once and the watermark advances once (no double-fetch / race).
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Open mechanical weight + new-rule PRs (else dry-run)"
        type: boolean
        default: false
      corpus_path:
        description: "Optional pre-materialized corpus dir (offline seam; skips the ADX fetch)"
        type: string
        default: ""
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: [self-hosted, kuskus]
    env:
      # gh only *reads* PR state for idempotency here (github.token suffices).
      # PR *creation* is done by a human from the pushed branch — the org blocks
      # Actions from opening PRs and caps tokens at 8 days, so there's no
      # elevated token to use; see propose-weight.sh / publish-candidate.sh.
      GH_TOKEN: ${{ github.token }}
      # Identity for the mechanical --apply commits (propose-weight.sh /
      # publish-candidate.sh). The persistent runner has no git user config, so
      # `git commit` aborts with exit 128 ("empty ident name"). Set it via env
      # (not `git config`) so nothing persists on the shared runner.
      GIT_AUTHOR_NAME: "github-actions[bot]"
      GIT_AUTHOR_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
      GIT_COMMITTER_NAME: "github-actions[bot]"
      GIT_COMMITTER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
      # Select the real Azure OpenAI drafter on the runner (KUSKUS_AOAI_* come
      # from the runner .env; see infra/terraform). CI/self-tests never set this,
      # so they keep scripts/mock-suggester.py — AOAI is called only here.
      SUGGESTER_CMD: "python3 scripts/aoai-suggester.py"
    steps:
      - uses: actions/checkout@v4

      - name: Build kql-guard scanner from source
        run: |
          # KUSKUS_STATE_DIR is set here (not job env): the `runner` context is
          # unavailable at job level, and $RUNNER_TEMP is only a step shell var.
          echo "KUSKUS_STATE_DIR=$RUNNER_TEMP/kuskus-state" >> "$GITHUB_ENV"
          # Build from HEAD so the scanner matches the source under review and
          # carries --shapes (the shipped release predates it). KQLGUARD_BIN
          # stays unset, so run-calibration/run-mining reuse this Debug dll via
          # the runner's SDK, and validate-candidate.sh can compile a new rule.
          dotnet build -c Debug

      - name: Fetch corpus + cost manifest
        id: fetch
        run: |
          if [[ -n "${{ inputs.corpus_path }}" ]]; then
            echo "corpus=${{ inputs.corpus_path }}" >> "$GITHUB_OUTPUT"
            echo "manifest=${{ inputs.corpus_path }}/manifest.json" >> "$GITHUB_OUTPUT"
            echo "offline seam: using supplied corpus, skipping ADX fetch"
            exit 0
          fi
          # Real ADX pull: MI login, watermark-in from the durable blob, fetch.
          # az CLI >=2.71 requires --client-id (not the removed --username) for a
          # user-assigned MI login.
          az login --identity --client-id "$KUSKUS_MI_CLIENT_ID" --output none
          mkdir -p "$KUSKUS_STATE_DIR"
          az storage blob download \
            --account-name "$KUSKUS_STATE_ACCOUNT" --container-name "$KUSKUS_STATE_CONTAINER" \
            --name watermark.txt --file "$KUSKUS_STATE_DIR/watermark.txt" \
            --auth-mode login --no-progress --only-show-errors \
            || echo "no prior watermark; fetch will bootstrap"
          scripts/fetch-corpus.sh
          echo "corpus=scratch" >> "$GITHUB_OUTPUT"
          echo "manifest=manifest.json" >> "$GITHUB_OUTPUT"

      - name: Persist watermark
        # Gated on fetch-step success (success() covers all prior steps) and real
        # mode, so a failed fetch never advances the durable watermark.
        if: success() && inputs.corpus_path == ''
        run: |
          az storage blob upload \
            --account-name "$KUSKUS_STATE_ACCOUNT" --container-name "$KUSKUS_STATE_CONTAINER" \
            --name watermark.txt --file "$KUSKUS_STATE_DIR/watermark.txt" \
            --overwrite --auth-mode login --no-progress --only-show-errors

      - name: Run calibration
        run: |
          APPLY=""
          if [[ "${{ inputs.apply }}" == "true" ]]; then APPLY="--apply"; fi
          scripts/run-calibration.sh \
            --corpus-path "${{ steps.fetch.outputs.corpus }}" \
            --manifest "${{ steps.fetch.outputs.manifest }}" $APPLY

      - name: Publish calibration report to job summary
        if: always()
        run: cat report.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Mine shapes + draft/validate/publish new-rule candidate
        run: |
          APPLY=""
          if [[ "${{ inputs.apply }}" == "true" ]]; then APPLY="--apply"; fi
          scripts/run-mining.sh \
            --corpus-path "${{ steps.fetch.outputs.corpus }}" \
            --manifest "${{ steps.fetch.outputs.manifest }}" $APPLY

      - name: Scrub corpus (persistent runner reuses its workspace)
        if: always()
        # Trust boundary: query text must not persist past a run. checkout wipes
        # scratch/ at the NEXT job start, but delete it now so it never lingers
        # between runs. Never touch a user-supplied corpus_path.
        run: rm -rf scratch "$KUSKUS_STATE_DIR" || true
