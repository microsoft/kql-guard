name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create release + upload assets
  packages: write   # push ghcr image

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "8.0.x" }
      - name: Publish NativeAOT
        run: dotnet publish -c Release -r ${{ matrix.rid }} -o out
      - name: Stage asset
        shell: bash
        run: |
          bin=out/kql-guard; [ -f "$bin.exe" ] && bin="$bin.exe"
          cp "$bin" "kql-guard-${{ matrix.rid }}${bin##*kql-guard}"
      - uses: softprops/action-gh-release@v2
        with:
          files: kql-guard-${{ matrix.rid }}*

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
